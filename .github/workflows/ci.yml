name: Playwright CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium
      - name: Run Playwright tests
        run: npx playwright test --reporter=json
      - name: Run flaky-detector (optional)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Find the most recent JSON report generated by Playwright
          REPORT=$(ls -t test-results/*.json | head -n 1)
          if [ -z "$REPORT" ]; then
            echo "No Playwright JSON report found – skipping flaky-detector."
            exit 0
          fi
          echo "Running flaky-detector on $REPORT"
          npx ts-node scripts/flaky-detector.ts "$REPORT"
